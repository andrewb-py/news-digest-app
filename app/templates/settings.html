{% extends "base.html" %}
{% block content %}
<h2>Настройки профиля</h2>
{% if msg %}<div class="alert alert-success">{{ msg }}</div>{% endif %}

<form method="POST" action="/profile/settings/notifications" class="mb-4 p-3 bg-white rounded">
  <div class="form-check form-switch">
    <input class="form-check-input" type="checkbox" name="email_notifications" id="notif" {% if settings.email_notifications %}checked{% endif %}>
    <label class="form-check-label" for="notif">Получать email-уведомления</label>
  </div>
  <button type="submit" class="btn btn-sm btn-primary mt-2">Сохранить</button>
</form>

<form method="POST" action="/profile/settings/topics" class="p-3 bg-white rounded">
  <h5>Темы интересов</h5>
  <div class="mb-3">
    <label class="form-label">Выберите темы интересов:</label>
    {% for topic in topics %}
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="topics" value="{{ topic.slug }}" id="t{{ topic.id }}" {% if topic.id in user_topic_ids %}checked{% endif %}>
      <label class="form-check-label" for="t{{ topic.id }}">{{ topic.name }}</label>
    </div>
    {% endfor %}
  </div>
  <button type="submit" class="btn btn-primary mt-3">Сохранить темы</button>
</form>
{% endblock %}
