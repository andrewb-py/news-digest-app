{% extends "base.html" %}
{% block content %}
<div class="card mx-auto mt-5" style="max-width:400px">
  <div class="card-body">
    <h3 class="card-title text-center">Вход</h3>
    {% if error %}<div class="alert alert-danger py-1 small">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
      <div class="mb-3"><label>Пароль</label><input type="password" name="password" class="form-control" required></div>
      <button class="btn btn-primary w-100">Войти</button>
    </form>
    <p class="mt-3 text-center"><a href="/auth/register">Нет аккаунта? Зарегистрируйтесь</a></p>
  </div>
</div>
{% endblock %}
